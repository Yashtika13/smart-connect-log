spring.application.name=smart-wifi-attendance
server.port=8080
server.servlet.context-path=/api

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/smart_wifi_attendance?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=ZmFrZS1zZWNyZXQta2V5LXNtYXJ0LXdpZmktYXR0ZW5kYW5jZS1jaGFuZ2UtaW4tcHJvZA==
app.jwt.expiration-ms=86400000

# Authorized Wi-Fi networks (comma-separated BSSIDs / SSIDs accepted for attendance)
app.wifi.allowed-ssids=CampusNet,OfficeWiFi
app.wifi.allowed-bssids=AA:BB:CC:DD:EE:01,AA:BB:CC:DD:EE:02

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:8080,http://localhost:3000

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.smartwifi=DEBUG
